<div class="${cardClass}">
    <div class="report-card-header">
        <h3 class="report-title" data-vuln-type="${formattedVulnType}">${formattedVulnTypeEmoji}</h3>
    </div>
    <div class="report-card-body">
        <div class="models-container">
            <div class="data-label">Models:</div>
            <div class="models-list">
                ${modelsHTML}
            </div>
        </div>
        
        <div class="report-dates">
            <div class="data-label">Dates: <span class="model-filter-badge">${datesSelectionBadgeHTML}</span></div>
            <div class="dates-list">
                ${datesHTML}
            </div>
        </div>
        
        <div class="report-stats">
            <div class="stat">
                <span class="stat-value">${totalFindings}</span>
                <span class="stat-label">🔍 Total</span>
            </div>
            <div class="stat critical-risk">
                <span class="stat-value">${criticalRisk}</span>
                <span class="stat-label">🔴 Critical</span>
            </div>
            <div class="stat high-risk">
                <span class="stat-value">${highRisk}</span>
                <span class="stat-label">🚨 High</span>
            </div>
            <div class="stat medium-risk">
                <span class="stat-value">${mediumRisk}</span>
                <span class="stat-label">⚠️ Medium</span>
            </div>
            <div class="stat low-risk">
                <span class="stat-value">${lowRisk}</span>
                <span class="stat-label">📌 Low</span>
            </div>
        </div>

        ${auditComparisonTableHTML}
        
        <div class="format-options">
            ${formatButtons}
        </div>
    </div>
</div>
