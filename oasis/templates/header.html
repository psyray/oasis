<header class="header">
    <div class="logo-container">
        <div class="logo-circle">
            <img src="{{ url_for('static', filename='img/oasis-logo.jpg') }}" alt="OASIS Logo" class="oasis-logo-img">
        </div>
        <h1 class="title">{% block header_title %}OASIS{% endblock %}</h1>
    </div>
    <div class="header-actions">
        <button
            id="theme-toggle"
            type="button"
            class="header-link header-theme-toggle"
            aria-label="Toggle dark mode"
            title="Toggle dark mode"
        >
            <span class="theme-toggle-icon" aria-hidden="true">🌙</span>
            <span class="theme-toggle-label visually-hidden">Dark</span>
        </button>
        {% if session.get('logged_in') %}
        <a href="{{ url_for('get_stats') }}" class="header-link header-link-reload" title="Reload">
            <span class="header-link-icon" aria-hidden="true">🔄</span>
            <span class="header-link-label visually-hidden">Reload</span>
        </a>
        <a href="{{ url_for('logout') }}" class="header-link header-link-logout" title="Logout">
            <span class="header-link-icon" aria-hidden="true">🔑</span>
            <span class="header-link-label visually-hidden">Logout</span>
        </a>
        {% endif %}
    </div>
</header>
