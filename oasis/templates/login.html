{% extends "base.html" %}

{% block title %}OASIS - Login{% endblock %}

{% block header_title %}Login{% endblock %}

{% block content %}
    <div class="login-body">
        <div class="login-container">
            <div class="logo-circle logo-login">
                <img src="{{ url_for('static', filename='img/oasis-logo.jpg') }}" alt="OASIS Logo" class="oasis-logo-img">
            </div>
            <h1>🏝️ OASIS</h1>
            <p><small><strong>O</strong>llama <strong>A</strong>utomated <strong>S</strong>ecurity <strong>I</strong>ntelligence <strong>S</strong>canner</small></p>
            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}
            <form method="post" id="login-form">
                <div class="form-control">
                    <input type="password" id="password" name="password" placeholder="Password" required autofocus>
                </div>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>
    <script>
        (function () {
            var pw = document.getElementById('password');
            var form = document.getElementById('login-form');
            if (!pw || !form) {
                return;
            }
            pw.addEventListener('paste', function () {
                setTimeout(function () {
                    if (!pw.value) {
                        return;
                    }
                    if (typeof form.requestSubmit === 'function') {
                        form.requestSubmit();
                    } else {
                        form.submit();
                    }
                }, 0);
            });
        })();
    </script>
{% endblock %}
